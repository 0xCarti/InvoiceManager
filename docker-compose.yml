version: '3.8'

services:
  web:
    image: gwcarti/invoicemanager:latest
    container_name: invoice-manager
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    volumes:
      - ./uploads:/app/uploads
      - ./backups:/app/backups
      - ./data:/app/data
      - ./import_files:/app/import_files
    env_file:
      - .env
    environment:
      - PORT=${PORT:-5000}
      - APP_ENV=${APP_ENV:-development}
      - DB_ENGINE=${DB_ENGINE:-sqlite}
      - SQLITE_PATH=${SQLITE_PATH:-/app/data/inventory.db}
      - DATABASE_URL=${DATABASE_URL:-}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-invoicemanager}
      - POSTGRES_USER=${POSTGRES_USER:-invoicemanager}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_me}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-disable}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-invoicemanager}
      - POSTGRES_USER=${POSTGRES_USER:-invoicemanager}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    ports: ${POSTGRES_PORTS:-[]}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-invoicemanager} -d ${POSTGRES_DB:-invoicemanager}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
